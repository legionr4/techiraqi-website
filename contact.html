<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - Tech_Iraqi</title>
    <meta name="description" content="تواصل مع فريق Tech_Iraqi لأي استفسار أو سؤال.">
    <!-- كود التحقق من ملكية الموقع لـ Google -->
    <meta name="google-site-verification" content="QCFsZaYKVYl0pqKAMSIPZA_25MW0knzooU-6VbQjxK4" />
    <!-- هذا هو السطر الخاص بأيقونة الموقع (Favicon) -->
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- إضافة مكتبة أيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- إضافة مكتبة AOS للتحريك عند التمرير -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <header>
        <div class="site-title"><a href="index.html">Tech_Iraqi</a></div>
        <button class="hamburger-menu" id="hamburger-button" aria-label="فتح القائمة" aria-expanded="false">
            <i class="fas fa-bars"></i>
        </button>
        <nav id="main-nav">
            <a href="index.html">الرئيسية</a>
            <a href="blog.html">المدونة</a>
            <a href="contact.html" class="active">اتصل بنا</a>
            <!-- زر الوضع الليلي لنسخة الموبايل -->
            <div class="mobile-nav-item">
                <button class="theme-toggle-button" title="تغيير الثيم"><i class="fas fa-moon"></i> <span>الوضع الليلي</span></button>
            </div>
            <div class="login-container-mobile" data-netlify-identity-button></div>
        </nav>
        <div class="header-actions">
            <button class="theme-toggle-button desktop-theme-toggle" title="تفعيل الوضع الليلي">
                <i class="fas fa-moon"></i>
            </button>
            <img src="iraqFlog.gif" alt="علم العراق" class="header-flag">
            <div class="login-container-desktop" data-netlify-identity-button></div>
        </div>
    </header>

    <main>
        <div class="content-card" data-aos="fade-up">
            <h1>تواصل معنا</h1>
            <p>املأ النموذج أدناه وسنقوم بالرد عليك في أقرب وقت ممكن.</p>
            
            <!-- نموذج الاتصال الذي يعمل مع Netlify -->
            <form name="contact" method="POST" data-netlify="true" action="/thank-you.html">
                <div class="form-group">
                    <label for="name">الاسم:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">رسالتك:</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
                <button type="submit">إرسال</button>
            </form>
        </div>
    </main>

    <button class="back-to-top" title="العودة إلى الأعلى" aria-label="العودة إلى الأعلى"><i class="fas fa-arrow-up"></i></button>

    <footer>
        <div class="social-icons">
            <a href="#" title="قم بتحديث الرابط لحسابك على تويتر" target="_blank" rel="noopener noreferrer" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" title="قم بتحديث الرابط لحسابك على لينكد إن" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://github.com/legionr4" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
        <div class="footer-links">
            <a href="privacy-policy.html">سياسة الخصوصية</a>
            <a href="terms-of-use.html">شروط الاستخدام</a>
        </div>
        <p class="copyright">جميع الحقوق محفوظة &copy; <span id="copyright-year">2024</span></p>
    </footer>

    <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
